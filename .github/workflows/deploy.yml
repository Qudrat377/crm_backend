name: Deploy CRM Backend

on:
  push:
    branches:
      - main  # Faqat main branchga push bo'lganda ishlaydi

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}     # Server IP manzili (GitHub Secrets-dan olinadi)
          username: ${{ secrets.SERVER_USER }} # Server foydalanuvchisi (ubuntu)
          key: ${{ secrets.SERVER_SSH_KEY }}   # Server Private Key (~/.ssh/id_rsa ichidagi kod)
          script: |
            # 1. Backend papkasiga o'tish
            cd /var/www/crm-backend
            
            # 2. Yangi kodni tortish
            git pull origin main
            
            # 3. Kutubxonalarni yangilash
            npm install
            
            # 4. Loyihani qayta yig'ish (Build)
            npm run build
            
            # 5. PM2 orqali restart berish
            pm2 restart crm-backend --update-env
            
            # --- AGAR FRONTEND HAM SHU YERDA BO'LSA, QUYIDAGINI QO'SHISH MUMKIN ---
            # cd /var/www/crm-frontend
            # git pull origin main
            # npm install
            # npm run build
            # pm2 restart crm-frontend